name: Update Remote Postgres

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
    inputs:
      manual_downloads:
        description: 'Кількість завантажень (лише для ручного запуску)'
        required: false
        default: ''
      manual_date:
        description: 'Дата у форматі РРРР-ММ-ДД (наприклад, 2026-01-20)'
        required: false
        default: ''

jobs:
  update_db:
    runs-on: ubuntu-latest
    steps:
      - name: Install DB driver
        run: |
          python -m pip install --upgrade pip
          pip install psycopg2-binary requests

      - name: Run Update
        env:
          DB_URL: ${{ secrets.DB_URL }}
          PACKAGE_ID: "Ivy"
          MANUAL_DOWNLOADS: ${{ github.event.inputs.manual_downloads }}
          MANUAL_DATE: ${{ github.event.inputs.manual_date }}
        run: |
          python - <<EOF
          import os
          import requests
          import psycopg2

          # 1. Get data from NuGet API or use manual input
          pkg = os.getenv('PACKAGE_ID')
          
          # Перевіряємо, чи ввів користувач дані вручну
          manual_downloads = os.getenv('MANUAL_DOWNLOADS')
          manual_date = os.getenv('MANUAL_DATE')

          if manual_downloads and manual_date:
              # Використовуємо ваші значення для симуляції
              downloads = int(manual_downloads)
              date_to_record = manual_date
              print(f"Симуляція: записуємо {downloads} завантажень за {date_to_record}")
          else:
              # Звичайний режим: API + сьогоднішня дата
              api_url = f"https://azuresearch-usnc.nuget.org/query?q=packageid:{pkg}"
              res = requests.get(api_url).json()
              downloads = res['data'][0]['totalDownloads']
              from datetime import date
              date_to_record = date.today().isoformat()
              print(f"API: отримано {downloads} завантажень за {date_to_record}")

          # 2. Connect to database
          try:
              conn = psycopg2.connect(os.getenv('DB_URL'))
              cur = conn.cursor()
              
              # Create table (if first run)
              cur.execute("""
                  CREATE TABLE IF NOT EXISTS nuget_history (
                      id SERIAL PRIMARY KEY,
                      package_name TEXT,
                      downloads BIGINT,
                      date DATE DEFAULT CURRENT_DATE,
                      UNIQUE(package_name, date)
                  );
              """)
              
              # Insert data (update if record exists for the date)
              query = """
              INSERT INTO nuget_history (package_name, downloads, date)
              VALUES (%s, %s, %s)
              ON CONFLICT (package_name, date) 
              DO UPDATE SET downloads = EXCLUDED.downloads;
              """
              cur.execute(query, (pkg, downloads, date_to_record))
              
              conn.commit()
              print(f"Success! {pkg}: {downloads} downloads added to database.")
          except Exception as e:
              print(f"Connection error: {e}")
              exit(1)
          finally:
              if 'conn' in locals():
                  cur.close()
                  conn.close()
          EOF

